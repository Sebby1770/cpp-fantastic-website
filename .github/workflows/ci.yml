name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
    env:
      CXX: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang curl

      - name: Configure & build
        run: |
          cmake -S . -B build
          cmake --build build

      - name: Unit tests
        run: ./build/aster_unit_tests

      - name: ctest
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test
        run: |
          chmod +x tests/smoke.sh
          ./tests/smoke.sh

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ curl

      - name: Configure & build (ASan + UBSan)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer'
          cmake --build build

      - name: Unit tests under sanitizers
        run: ./build/aster_unit_tests

      - name: Smoke test under sanitizers
        run: |
          chmod +x tests/smoke.sh
          ./tests/smoke.sh
