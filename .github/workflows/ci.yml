name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ curl

      - name: Configure & build
        run: |
          cmake -S . -B build
          cmake --build build

      - name: Unit tests
        run: ./build/aster_unit_tests

      - name: Smoke test
        run: |
          chmod +x tests/smoke.sh
          ./tests/smoke.sh
