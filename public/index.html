<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AsterForge - C++ Fantastic Website</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="control-rail" aria-label="AsterForge controls">
      <div class="brand-lockup">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <p class="eyebrow">C++ Web App</p>
          <h1>AsterForge</h1>
        </div>
      </div>

      <section class="panel compact">
        <div class="panel-heading">
          <h2>Mode</h2>
          <span id="serverStatus" class="status-pill">checking</span>
        </div>
        <div class="segmented" role="group" aria-label="Mode">
          <button class="mode-button active" data-mode="pulse" type="button">Pulse</button>
          <button class="mode-button" data-mode="route" type="button">Route</button>
          <button class="mode-button" data-mode="forge" type="button">Forge</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Inputs</h2>
          <button id="randomizeSeed" class="icon-button" type="button" aria-label="Randomize seed" title="Randomize seed">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 3h4v4h-2V6.4l-4.7 4.7-1.4-1.4L17.6 5H17V3z"></path><path d="M3 7.5h3.6c1.5 0 2.8.8 3.6 2l.7 1 .7-1c.8-1.2 2.1-2 3.6-2H17v2h-1.8c-.8 0-1.5.4-2 1.1l-1.1 1.6 1.1 1.6c.5.7 1.2 1.1 2 1.1H17v2h-1.8c-1.5 0-2.8-.8-3.6-2l-.7-1-.7 1c-.8 1.2-2.1 2-3.6 2H3v-2h3.6c.8 0 1.5-.4 2-1.1l1.1-1.6-1.1-1.6c-.5-.7-1.2-1.1-2-1.1H3v-2z"></path><path d="M19 17.6V17h2v4h-4v-2h.6l-3.2-3.2 1.4-1.4L19 17.6z"></path></svg>
          </button>
        </div>
        <label class="field">
          <span>Seed</span>
          <input id="seedInput" type="text" value="sebby" maxlength="28" autocomplete="off">
        </label>
        <label class="field">
          <span>Intensity <output id="intensityValue">68</output></span>
          <input id="intensityInput" type="range" min="1" max="100" value="68">
        </label>
        <label class="field">
          <span>Tempo <output id="tempoValue">42</output></span>
          <input id="tempoInput" type="range" min="1" max="100" value="42">
        </label>
        <label class="toggle-row">
          <input id="gridToggle" type="checkbox" checked>
          <span>Grid</span>
        </label>
        <label class="toggle-row">
          <input id="trailToggle" type="checkbox" checked>
          <span>Trails</span>
        </label>
        <button id="generateButton" class="primary-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2l1.8 6.1L20 10l-6.2 1.9L12 18l-1.8-6.1L4 10l6.2-1.9L12 2z"></path><path d="M19 15l.8 2.7L22.5 18l-2.7.8L19 21.5l-.8-2.7-2.7-.8 2.7-.8L19 15z"></path></svg>
          Generate
        </button>
      </section>

      <section class="panel palette-panel">
        <div class="panel-heading">
          <h2>Palette</h2>
          <span id="paletteName">live</span>
        </div>
        <div id="swatches" class="swatches" aria-label="Generated palette"></div>
      </section>
    </aside>

    <section class="stage" aria-label="Interactive constellation workspace">
      <canvas id="skyCanvas" aria-label="Generated constellation"></canvas>
      <div class="stage-topbar">
        <div>
          <p class="eyebrow">Mission</p>
          <h2 id="missionName">Loading</h2>
        </div>
        <div class="topbar-actions">
          <button id="copyButton" class="glass-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v6a3 3 0 0 1-3 3h-1v1a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-6a3 3 0 0 1 3-3h1V7zm3-1a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-6zM7 10a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h-3a3 3 0 0 1-3-3v-3H7z"></path></svg>
            Copy JSON
          </button>
        </div>
      </div>
      <div id="metricStrip" class="metric-strip" aria-label="Live metrics"></div>
    </section>

    <aside class="intel-panel" aria-label="Generated mission details">
      <section class="panel hero-panel">
        <p class="eyebrow">Signal</p>
        <h2 id="missionTagline">Preparing the launch board.</h2>
        <p id="updatedAt" class="muted">Waiting for C++ response</p>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Priorities</h2>
          <span id="modeBadge">Pulse</span>
        </div>
        <ol id="priorityList" class="priority-list"></ol>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Waypoints</h2>
          <span>today</span>
        </div>
        <div id="waypoints" class="waypoints"></div>
      </section>
    </aside>
  </main>
  <script src="/app.js"></script>
</body>
</html>
